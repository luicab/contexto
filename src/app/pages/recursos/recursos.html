<section class="abc">
  <div class="container abc__inner">
    <h1 class="abc__title">Abecedario</h1>

    <div class="abc__grid">
      @for (row of alphabet(); track $index; let ri = $index) {
        <div class="abc__row">
          @for (letter of row; track $index; let ci = $index) {
            <div class="abc__cell">
              <span class="abc__letter">{{ letter }}</span>
              <span class="abc__label">{{ labels()[ri][ci] }}</span>
            </div>
          }
        </div>
      }
    </div>

    <div class="abc__actions">
      <button class="btn btn--primary" (click)="regenerate()">
        Actualizar
      </button>
    </div>
  </div>
</section>
